quality_compounder:
  return_on_equity_pct_min: 15
  debt_to_equity_max: 1.0
  free_cash_flow_cr_min: 0
  revenue_cagr_5yr_min: 10

value_pick:
  # PE and PB ratios are typically calculated using live stock prices,
  # which are not part of the core financial_ratios table.
  # For this sprint, we'll use other value indicators.
  return_on_equity_pct_min: 12
  debt_to_equity_max: 1.5
  book_value_per_share_min: 0 # Must be positive

growth_accelerator:
  revenue_cagr_5yr_min: 20
  pat_cagr_5yr_min: 20
  return_on_equity_pct_min: 15
  debt_to_equity_max: 2.0

dividend_champion:
  # Dividend Yield requires stock price. We'll use payout ratio.
  dividend_payout_ratio_pct_max: 75
  debt_to_equity_max: 1.0
  pat_cagr_5yr_min: 5

debt_free_bluechip:
  debt_to_equity_max: 0.1 # Effectively debt-free
  return_on_equity_pct_min: 12

turnaround_watch:
  # This requires comparing multiple years, which the current engine doesn't support.
  # We will use recent performance as a proxy.
  net_profit_margin_pct_min: 1
  revenue_cagr_1yr_min: 10 # Assuming 1yr cagr is available